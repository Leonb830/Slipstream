name: Quality Guardrails

on:
  pull_request:
  push:
    branches: ["main", "work"]

jobs:
  web-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Bundle size warning budget
        run: npm run check:bundle
      - name: Lighthouse budget targets
        run: npm run check:lighthouse
